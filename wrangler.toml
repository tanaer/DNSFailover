name = "dns-failover"
main = "src/index.js"
compatibility_date = "2024-01-01"

# KV 命名空间绑定 - 一键部署时会自动创建
[[kv_namespaces]]
binding = "KV"
id = "8425493c30d14f04b531e9858daf1e62"

# 定时触发器 - 每分钟执行一次健康检查
[triggers]
crons = ["* * * * *"]

# 环境变量 - 一键部署时会提示输入
[vars]
ADMIN_PASSWORD = "admin123"              # 管理员登录密码
TURNSTILE_SITE_KEY = ""                  # Cloudflare Turnstile 站点密钥（可选）
TURNSTILE_SECRET_KEY = ""                # Cloudflare Turnstile 秘密密钥（可选）
